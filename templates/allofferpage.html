{% extends 'base.html' %}
{% block content %}
<style>
h2 {
    text-align: center;
    margin: 20px 0;
    font-size: 28px;
    color: #333;
}

.book-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.book-card {
    width: 180px;
    background: #fff;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.book-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.book-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
}

.book-card h4 {
    font-size: 16px;
    margin: 8px 0;
    color: #222;
}

.book-card p {
    font-size: 14px;
    color: #666;
    margin: 4px 0;
}

.book-card p:last-child {
    font-weight: bold;
    color: #000;
    margin-top: 6px;
}
</style>


<h2>All Offer Books</h2>

<div class="book-container">
{% for book in offerbooks %}
    <div class="book-card">
        <img src="{{ book.image.url }}" alt="">
        <h4>{{ book.title }}</h4>
        <p>{{ book.author }}</p>
        <p>₹ {{ book.price }}</p>
    </div>
{% endfor %}
</div>
{% endblock %}
